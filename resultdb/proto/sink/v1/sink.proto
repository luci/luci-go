syntax = "proto3";

package luci.resultdb.sink.v1;

import "go.chromium.org/luci/resultdb/proto/sink/v1/test_result.proto";

option go_package = "go.chromium.org/luci/resultdb/proto/sink/v1;sinkpb";

// SinkMessage is a request message to a ResultSink server.
message SinkMessage {
  oneof msg {
    // Handshake the auth token to authenticate an incoming client.
    Handshake handshake = 1;

    // Upload one test result.
    TestResult test_result = 2;

    // Upload all test results from this file.
    TestResultFile test_result_file = 3;
  }
}

// Sent from a client with the secret auth_token, obtained via LUCI_CONTEXT.
//
// This message must be sent before any other messages. Additional Handshake
// messages sent after the first one are ignored.
message Handshake {
  string auth_token = 1;
}
