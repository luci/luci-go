syntax = "proto3";

package luci.resultdb.bq;

option go_package = "go.chromium.org/luci/resultdb/proto/bq;resultpb";

// ArtifactRow represents a row in a BigQuery table for result of a functional
// test case.
message ArtifactRow {
  // Id of the parent invocation this artifact belongs to.
  string invocation_id = 1;

  // Test_id and result_id can identify the test result in the invocation
  // this artifact belongs to.
  // They will be empty if the artifact is an invocation-level artifact.
  string test_id = 2;
  string result_id = 3;

  // Id of the artifact.
  string artifact_id = 4;

  // Id of the artifact shard.
  // Row size limit is 5Mib according to
  // https://cloud.google.com/bigquery/quotas#streaming_inserts
  // If the size of the artifact content is larger than that, we'll need to
  // shard it at line breaks (LF, CRLF or CR).
  // Shard_id is monotonically increasing and starts at 0.
  int32 shard_id = 5;

  // Artifact shard content. Enforced to utf-8.
  string content = 6;
}
