syntax = "proto3";

package internal.proto;

option go_package = "internalpb";

// A message for storing all the information attached to a cursor through query results.
message Cursor {
	// Request holds the hash for other parameters associated with this cursor.
	// This must not change between pagination calls.
	bytes request_hash = 1;

	// PageSize is the number of page entries this cursor should fetch per call.
	// It may be updated on subsequent pagination calls.
	int32 pageSize = 2;

	// Offset is the cursor position.
	int64 offset = 3;
}
