syntax = "proto3";

package luci.resultdb.internal.ui;

import "go.chromium.org/luci/resultdb/proto/v1/artifact.proto";
import "go.chromium.org/luci/resultdb/proto/v1/common.proto";
import "go.chromium.org/luci/resultdb/proto/v1/predicate.proto";
import "go.chromium.org/luci/resultdb/proto/v1/test_result.proto";

option go_package = "go.chromium.org/luci/resultdb/internal/proto/ui;internalpb";

// Service specific to UIs that present test results.
// Do not use this service without talking to its owners.
service UI {
  // For displaying test variants in the UI.
  // Benefit of this RPC over QueryTestResults:
  // 1. The UI displays the results grouped by variant status and variant.
  // It's more natural to have an endpoint that returns ordered the same way.
  // 2. The "load more" button in the UI can be more consistent of how many entries
  // it will add to the existing list because the RPC is paginated by test variants
  // not test results.
  // 3. The test variant status can be reliably computed since the results of a
  // variant won't be split into multiple pages.
  // 4. We can have a cleaner interface for filtering test variants. Often time
  // what we really want to filter is test variants not test results.
  rpc QueryTestVariants(QueryTestVariantsRequest) returns (QueryTestVariantsResponse) {};
}

// A request message for QueryTestVariants RPC.
message QueryTestVariantsRequest {
  enum View {
    VIEW_UNSPECIFIED = 0; // same as MILO
    MILO = 1;
    // Unlike MILO, TestResultBundle messages will include artifacts.
    GERRIT = 2;
  }
  View view = 1;

  // Retrieve test variants included in these invocations, directly or indirectly
  // (via Invocation.included_invocations).
  //
  // Specifying multiple invocations is equivalent to querying one invocation
  // that includes these.
  repeated string invocations = 2;

  // A Test variant in the response must satisfy this predicate.
  TestVariantPredicate predicate = 3;

  // The maximum number of test variants to return.
  //
  // The service may return fewer than this value.
  // If unspecified, at most 100 test variants will be returned.
  // The maximum value is 1000; values above 1000 will be coerced to 1000.
  int32 page_size = 4;

  // A page token, received from a previous `QueryTestVariants` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `QueryTestVariants` MUST
  // match the call that provided the page token.
  string page_token = 5;
}

// A response message for QueryTestVariants RPC.
message QueryTestVariantsResponse {
  // Matched test variants.
  // Ordered by TestVariantStatus, test_id, then variant_hash
  repeated TestVariant test_variants = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there were no subsequent pages at the time of
  // request.
  string next_page_token = 2;
}

// Represents a function TestVariant -> bool.
// Empty message matches all test variants.
message TestVariantPredicate {
  // A test variant must have a test id matching this regular expression
  // entirely, i.e. the expression is implicitly wrapped with ^ and $.
  string test_id_regexp = 1;

  // A test variant must have a variant satisfying this predicate.
  luci.resultdb.v1.VariantPredicate variant = 2;
}

// Represents a matching test variant with its outcomes
// (including result and perhaps artifact).
message TestVariant {
  // A unique identifier of the test in a LUCI project.
  // Regex: ^[[::print::]]{1,256}$
  //
  // Refer to uci.resultdb.v1.TestResult.test_id for details.
  string test_id = 1;

  // Description of one specific way of running the test,
  // e.g. a specific bucket, builder and a test suite.
  luci.resultdb.v1.Variant variant = 2;

  // Hash of the variant.
  // hex(sha256(sorted(''.join('%s:%s\n' for k, v in variant.items())))).
  //
  // Output only.
  string variant_hash = 3;

  // Status of the test variant. See TestVariantStatus for possible statuses.
  TestVariantStatus status = 4;

  // Outcomes of the test variant.
  // It contains results always, and also artifacts in GERRIT view.
  repeated TestResultBundle results = 5;

  // Test exonerations if any test variant is exonerated.
  repeated luci.resultdb.v1.TestExoneration exonerations = 6;
}

// Outcomes of an execution of the test variant.
message TestResultBundle {
  // Result of the test variant execution.
  luci.resultdb.v1.TestResult result = 1;

  // Artifacts that are produced by the test variant execution.
  //
  // Included only in GERRIT view, see QueryTestVariantsRequest.View.GERRIT.
  // Note: we don't need to implement these in v0.
  repeated luci.resultdb.v1.Artifact artifacts = 2;
}

// Status of a test variant.
enum TestVariantStatus {
  // a test variant must not have this status.
  // This is only used when filtering variants.
  TEST_VARIANT_STATUS_UNSPECIFIED = 0;
  // The test variant has no exoneration, and all results are unexpected.
  UNEXPECTED = 1;
  // The test variant has no exoneration, and has both expected and unexpected
  // results.
  FLAKY = 2;
  // The test variant has one or more test exoneration.
  EXONERATED = 3;
  // The test variant has no exoneration, and all results are expected.
  EXPECTED = 16;
}
