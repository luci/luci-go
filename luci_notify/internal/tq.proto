// Messages for the task queue.

syntax = "proto3";

package internal;

// EmailTask represents a single email notification to be dispatched.
message EmailTask {
  // Recipients is a list of email addresses to send the email to.
  repeated string recipients = 1;

  // Subject is the subject line of the email to be sent.
  string subject = 2;

  // BuildInfo is an HTML-formatted string containing information regarding the
  // build.
  string build_info = 3;

  // Milo is the necessary information to pull additional information from
  // Milo's API.
  MiloInfo milo = 4;
}

// MiloInfo represents the information necessary to ask Milo about a particular
// build.
message MiloInfo {
  // SwarmingTask is the swarming task ID related to the build of interest.
  string swarming_task = 1;
}

