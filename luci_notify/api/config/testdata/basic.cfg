Notifiers {
    Name: "basic"
    Notifications {
        OnFailure: true
	Email {
            Recipients: "test-failure@example.com"
	}
    }
    Notifications {
        OnSuccess: true
	Email {
            Recipients: "test-success@example.com"
	}
    }
    Notifications {
        OnChange: true
	Email {
            Recipients: "test-change@example.com"
	}
    }
    Builders {
        Name: "test-builder"
	Bucket: "hello"
    }
}
