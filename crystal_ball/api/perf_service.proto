}

// Response message for the FetchDashboardWidgetData method.
// Contains the data for the single requested widget.
message FetchDashboardWidgetDataResponse {
  // The ID of the widget this data result corresponds to.
  string widget_id = 1;

  // The type of widget data, pre-processed for the widget type.
  oneof result_type {
    // Data specifically prepared for a MultiMetricChart.
    MultiMetricChartData multi_metric_chart_data = 2;

    // Data for a Markdown widget
    MarkdownWidget markdown_widget = 4;

    // Data specifically prepared for a BreakdownTable widget
    BreakdownTableData breakdown_table_data = 5;

    // Data specifically prepared for an InvocationDistribution widget
    InvocationDistributionData invocation_distribution_data = 6;
  }
}

// Data structured and transformed for the MultiMetricChart component.
message MultiMetricChartData {
  // Key for the X-axis data within each data point Struct (e.g., "time").
  string x_axis_data_key = 1;

  // Key used to access the Y-axis value within each data point (e.g., "value").
  string y_axis_data_key = 2;

  // The individual lines to be plotted on the chart.
  repeated MultiMetricLine lines = 3;
}

// Represents a single line series in a MultiMetricChart.
message MultiMetricLine {
  // A unique identifier for this series.
  string series_id = 1;

  // Label for the legend.
  string legend_label = 2;

  // The array of data points for this specific line, sorted by the x-axis
  // value.
  repeated google.protobuf.Struct data_points = 3;

  // Metric field of the PerfChartSeries from which this line was derived.
  string metric_field = 4;
}

// Data structured and transformed for the InvocationDistribution component.
message InvocationDistributionData {
  // Key for the X-axis data within each data point Struct (e.g., "time").
  string x_axis_data_key = 1;

  // Key used to access the Y-axis value within each data point (e.g., "value").
  string y_axis_data_key = 2;

  // The individual groups of points to be plotted on the chart.
  repeated InvocationDistributionPoints points = 3;
}

// Represents a group of points in an InvocationDistribution chart.
message InvocationDistributionPoints {
  // A unique identifier for this series.
  string series_id = 1;

  // Label for the legend.
  string legend_label = 2;

  // The array of data points for this specific group.
  repeated google.protobuf.Struct points = 3;

  // Metric field of the PerfChartSeries from which this group was derived.
  string metric_field = 4;
}

// Represents data structured for a Breakdown Table widget.
message BreakdownTableData {
  // Represents one of the breakdown dimensions requested.
  repeated BreakdownSection sections = 1;
}

// Represents one table in the breakdown (e.g., the "atptestname" or
// "gpu_vendor" table).
message BreakdownSection {
  // Represents the dimension this section is grouped by.
  string dimension_column = 1;

  // Represents the rows of the table. Each struct in `rows` contains:
  // -   A key matching `dimension_column` with the value for this breakdown
  //     group.
  // -   Keys for each metric in the chart, with their aggregated values
  //     for this breakdown group.
  // The number of rows returned is limited to a server-defined maximum
  // (e.g., 1000).
  repeated google.protobuf.Struct rows = 2;
}

// Represents the content of a dashboard state. The structure is inspired by
// concepts in Plx dashboards (like filters and data sources) but is defined
// independently within this API.
message PerfDashboardContent {
  // A map of data source definitions relevant to this dashboard state.
  // The key is a unique identifier for the data source within this state.
  // The key should be 4-63 characters and conform to RFC-1034.
  // It must start with a lowercase letter, and all subsequent characters
  // must be lowercase letters, numbers, or hyphens, and the value must not
  // end with a hyphen.
  map<string, PerfDataSpec> data_specs = 1
      [(google.api.field_behavior) = OPTIONAL];

  // Global filters that apply to all applicable charts in this dashboard.
  repeated PerfFilter global_filters = 2
      [(google.api.field_behavior) = OPTIONAL];

  // List of widgets within this dashboard.
  repeated PerfWidget widgets = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Defines a single widget within the dashboard.
message PerfWidget {
  // Unique identifier for this widget within the dashboard.
  // The ID should be 4-63 characters and conform to RFC-1034.
  // It must start with a lowercase letter, and all subsequent characters
  // must be lowercase letters, numbers, or hyphens, and the value must not
  // end with a hyphen.
  string id = 1 [(google.api.field_behavior) = REQUIRED];

  // User-visible title for the widget.
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];

  // The type of widget.
  oneof widget_type {
    // A markdown widget.
    MarkdownWidget markdown = 3;

    // A chart widget.
    PerfChartWidget chart = 4;
  }
}

// Widget for displaying formatted text using Markdown.
message MarkdownWidget {
  // The Markdown content to be rendered.
  string content = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Defines a single chart within the dashboard.
message PerfChartWidget {
  // User-visible title for the chart.
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];

  // Type of the chart.
  // This enum is not frozen, and new values may be added in the future.
  enum ChartType {
    // Unspecified chart type.
    CHART_TYPE_UNSPECIFIED = 0;
    // Regression metric chart.
    REGRESSION_METRIC_CHART = 1;
    // Multi-metric chart.
    MULTI_METRIC_CHART = 2;
    // Breakdown table chart.
    BREAKDOWN_TABLE = 3;
    // Distribution of individual invocation values for a metric.
    INVOCATION_DISTRIBUTION = 4;
  }

  // The type of this chart.
  ChartType chart_type = 2 [(google.api.field_behavior) = OPTIONAL];

  // The effective chart type used. If `chart_type` is not specified,
  // the server may use a default type.
  ChartType effective_chart_type = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Default Data Spec ID for series in this chart.
  string data_spec_id = 4 [(google.api.field_behavior) = REQUIRED];

  // Filters specific to this chart, applied to all series unless overridden.
  repeated PerfFilter filters = 5 [(google.api.field_behavior) = OPTIONAL];

  // The series to display on this chart.
  // For INVOCATION_DISTRIBUTION, typically only one series is used.
  repeated PerfChartSeries series = 6 [(google.api.field_behavior) = OPTIONAL];

  // X axis configuration.
  PerfXAxisConfig x_axis = 7 [(google.api.field_behavior) = OPTIONAL];

  // Configuration for the Left Y Axis.
  PerfYAxisConfig left_y_axis = 8 [(google.api.field_behavior) = OPTIONAL];

  // Configuration for the Right Y Axis (for Dual Y-Axes Support).
  PerfYAxisConfig right_y_axis = 9 [(google.api.field_behavior) = OPTIONAL];

  // Configuration for splitting a single metric in `series` by a dimension.
  // Typically used when only one series is defined, and the split generates
  // the rest.
  PerfSeriesSplit series_split = 10 [(google.api.field_behavior) = OPTIONAL];

  // Specific configuration for the INVOCATION_DISTRIBUTION chart type.
  // Deprecated: Use `chart_config.invocation_distribution_chart_config`
  // instead.
  InvocationDistributionConfig invocation_distribution_config = 11
      [(google.api.field_behavior) = OPTIONAL, deprecated = true];

  oneof chart_config {
    // Specific configuration for the INVOCATION_DISTRIBUTION chart type.
    InvocationDistributionConfig invocation_distribution_chart_config = 12
        [(google.api.field_behavior) = OPTIONAL];

    // Configuration for the BREAKDOWN_TABLE chart type.
    BreakdownTableConfig breakdown_table_widget_chart_config = 13
        [(google.api.field_behavior) = OPTIONAL];
  }
}

// Represents a single series on a chart.
message PerfChartSeries {
  // Optional display name for this series legend.
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];

  // The ID of the PerfDataSpec to use for this series.
  // Defaults to the chart's data_spec_id if not specified.
  string data_spec_id = 2 [(google.api.field_behavior) = OPTIONAL];

  // The specific metric field from the data spec to plot.
  string metric_field = 3 [(google.api.field_behavior) = REQUIRED];

  // Filters specific to this series. Applied in addition to chart and global
  // filters.
  repeated PerfFilter filters = 4 [(google.api.field_behavior) = OPTIONAL];

  // Enum for aggregation functions.
  // This enum is not frozen, and new values may be added in the future.
  enum PerfAggregationFunction {
    // Unspecified.
    PERF_AGGREGATION_FUNCTION_UNSPECIFIED = 0;
    // Mean.
    MEAN = 1;
    // Percentile 50.
    P50 = 2;
    // Percentile 75.
    P75 = 3;
    // Percentile 90.
    P90 = 4;
    // Percentile 99.
    P99 = 5;
    // Minimum.
    MIN = 6;
    // Maximum.
    MAX = 7;
    // Count.
    COUNT = 8;
  }

  // The aggregation function to apply to this series (for TIME_SERIES, etc.).
  PerfAggregationFunction aggregation = 5
      [(google.api.field_behavior) = OPTIONAL];

  // Enum for Y Axis assignment
  // This enum is not frozen, and new values may be added in the future.
  enum YAxisAssignment {
    // Unspecified, defaults to LEFT.
    Y_AXIS_ASSIGNMENT_UNSPECIFIED = 0;
    // Left Y axis.
    LEFT = 1;
    // Right Y axis.
    RIGHT = 2;
  }

  // Which Y axis to associate this series with.
  YAxisAssignment y_axis_assignment = 6
      [(google.api.field_behavior) = OPTIONAL];

  // Whether to show confidence intervals for this series.
  bool show_confidence_interval = 7 [(google.api.field_behavior) = OPTIONAL];

  // The effective data spec ID used for this series. This will be
  // `data_spec_id` if provided, otherwise it defaults to the chart's
  // `data_spec_id`.
  string effective_data_spec_id = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The effective Y axis assignment for this series. Defaults to LEFT
  // if `y_axis_assignment` is not specified.
  YAxisAssignment effective_y_axis_assignment = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // CSS color string for rendering this series line (e.g., "#8884d8", "red").
  string color = 10 [(google.api.field_behavior) = OPTIONAL];

  // Unique identifier for this series within its chart.
  // The ID should be 4-63 characters and conform to RFC-1034.
  // It must start with a lowercase letter, and all subsequent characters
  // must be lowercase letters, numbers, or hyphens, and the value must not
  // end with a hyphen.
  string id = 11 [(google.api.field_behavior) = OPTIONAL];
}

// Configuration for the X axis.
message PerfXAxisConfig {
  // The column from the data spec to use for the X axis (e.g., build_id,
  // ingestion_time).
  string column = 1 [(google.api.field_behavior) = REQUIRED];

  // Defines the granularity for bucketizing the X-axis data.
  // This enum is not frozen, and new values may be added in the future.
  enum Granularity {
    // Unspecified granularity. Server may use a default or no bucketization.
    GRANULARITY_UNSPECIFIED = 0;
    // Group by each unique value in the column.
    PER_VALUE = 1;
    // Group by hour. Requires a timestamp-compatible column.
    HOURLY = 2;
    // Group by day. Requires a timestamp-compatible column.
    DAILY = 3;
    // Group by week. Requires a timestamp-compatible column.
    WEEKLY = 4;
    // Group by build ID. Requires a build ID column.
    PER_BUILD = 5;
  }

  // The granularity to apply to the X-axis column.
  Granularity granularity = 2 [(google.api.field_behavior) = OPTIONAL];

  // The effective granularity used. If `granularity` is not specified,
  // the server may use a default or no bucketization.
  Granularity effective_granularity = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Configuration for a Y axis.
message PerfYAxisConfig {
  // Optional display name for the axis.
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional minimum value for the axis range.
  optional double min_value = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional maximum value for the axis range.
  optional double max_value = 3 [(google.api.field_behavior) = OPTIONAL];

  // Whether to use a logarithmic scale.
  bool logarithmic = 4 [(google.api.field_behavior) = OPTIONAL];
}

// How to split a metric into multiple series.
message PerfSeriesSplit {
  // The dimension to split by.
  oneof dimension_type {
    // Split by an invocation-level dimension (e.g., build_target, branch).
    string invocation_dimension = 1;

    // Split by a metric-specific dimension.
    string metric_dimension = 2;
  }

  // Optional: Limit the number of series created by the split.
  int32 limit_count = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Configuration for an Invocation Distribution chart.
message InvocationDistributionConfig {
  // Options for SCATTER type.
  message ScatterSettings {
    // The metric field to use for the X-axis.
    string x_axis_metric_field = 1 [(google.api.field_behavior) = OPTIONAL];
  }

  // Configuration settings specific to the chosen distribution type.
  oneof settings {
    // Settings for SCATTER type.
    ScatterSettings scatter_settings = 2
        [(google.api.field_behavior) = OPTIONAL];
  }
}

// Configuration for a Breakdown Table chart.
message BreakdownTableConfig {
  // Aggregation functions.
  enum BreakdownAggregation {
    // Unspecified aggregation.
    BREAKDOWN_AGGREGATION_UNSPECIFIED = 0;
    // Count of values.
    COUNT = 1;
    // Minimum value.
    MIN = 2;
    // Maximum value.
    MAX = 3;
    // Mean of values.
    MEAN = 4;
    // 50th percentile.
    P50 = 5;
    // 75th percentile.
    P75 = 6;
    // 90th percentile.
    P90 = 7;
    // 99th percentile.
    P99 = 8;
  }
  // The aggregation functions to apply to the metrics in the table.
  repeated BreakdownAggregation aggregations = 1;

  // The default dimension to display first in the UI.
  string default_dimension = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Defines a data specification, similar to concepts in Plx DataSpec.
message PerfDataSpec {
  // Human-readable name for the data source.
  string display_name = 1 [(google.api.field_behavior) = OPTIONAL];

  // Details about the source of the data.
  PerfDataSource source = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Defines the source of the data.
message PerfDataSource {
  // Type of the data source.
  // This enum is not frozen, and new values may be added in the future.
  enum SourceType {
    // Unspecified data source type.
    SOURCE_TYPE_UNSPECIFIED = 0;
    // SQL query.
    SQL = 1;
    // Table name.
    TABLE = 2;
  }

  // The type of the data source.
  SourceType type = 1 [(google.api.field_behavior) = OPTIONAL];
}

// A filter configuration, similar to concepts in Plx Filter widgets.
message PerfFilter {
  // Unique identifier for this filter within its scope (global or chart).
  // The ID should be 4-63 characters and conform to RFC-1034.
  // It must start with a lowercase letter, and all subsequent characters
  // must be lowercase letters, numbers, or hyphens, and the value must not
  // end with a hyphen.
  string id = 1 [(google.api.field_behavior) = REQUIRED];

  // The column in the data source this filter applies to.
  string column = 2 [(google.api.field_behavior) = REQUIRED];

  // The ID of the PerfDataSpec in PerfDashboardContent.data_specs
  // that this filter is associated with.
  string data_spec_id = 3 [(google.api.field_behavior) = REQUIRED];

  // User-visible title for the filter.
  string display_name = 4 [(google.api.field_behavior) = OPTIONAL];

  // The specific configuration for the type of filter.
  oneof filter_type {
    // Dropdown select filter.
    SelectFilter select = 5;
    // Free form text input filter.
    TextInputFilter text_input = 6;
    // Numerical input filter.
    NumberInputFilter number_input = 7;
    // Range selection filter.
    RangeFilter range = 8;
    // Date selection filter.
    DatePickerFilter date_picker = 9;
  }
}

// Configuration for a SELECT filter (dropdown).
message SelectFilter {
  // Whether multiple selections are allowed.
  bool multi_select = 1 [(google.api.field_behavior) = OPTIONAL];

  // Default values and operator.
  PerfFilterDefault default_value = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Configuration for a TEXT_INPUT filter.
message TextInputFilter {
  // Default value and operator.
  PerfFilterDefault default_value = 1 [(google.api.field_behavior) = OPTIONAL];
}

// Configuration for a NUMBER_INPUT filter.
message NumberInputFilter {
  // Default value and operator.
  PerfFilterDefault default_value = 1 [(google.api.field_behavior) = OPTIONAL];
}

// Configuration for a RANGE filter.
message RangeFilter {
  // Default values and operator. Typically uses BETWEEN or similar.
  PerfFilterDefault default_value = 1 [(google.api.field_behavior) = OPTIONAL];
}

// Configuration for a DATE_PICKER filter.
message DatePickerFilter {
  // Whether to allow selecting a range of dates.
  bool multi_select = 1 [(google.api.field_behavior) = OPTIONAL];

  // Default value and operator.
  PerfFilterDefault default_value = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Default value for a filter.
message PerfFilterDefault {
  // The default value(s). The number of values required depends on the
  // operator.
  repeated string values = 1 [(google.api.field_behavior) = OPTIONAL];

  // The set of allowed filter operators.
  // This enum is not frozen, and new values may be added in the future.
  enum FilterOperator {
    // Unspecified filter operator.
    FILTER_OPERATOR_UNSPECIFIED = 0;
    // Equal to (=).
    EQUAL = 1;
    // Not equal to (!=).
    NOT_EQUAL = 2;
    // Greater than (>).
    GREATER_THAN = 3;
    // Less than (<).
    LESS_THAN = 4;
    // Greater than or equal to (>=).
    GREATER_THAN_OR_EQUAL = 5;
    // Less than or equal to (<=).
    LESS_THAN_OR_EQUAL = 6;
    // Value is in the provided set (IN).
    IN = 7;
    // Value is not in the provided set (NOT_IN).
    NOT_IN = 8;
    // Value is between the two provided values (BETWEEN). Requires exactly two
    // values in `values`.
    BETWEEN = 9;
    // Value matches the provided regex pattern. Requires exactly one value in
    // `values` containing the regex.
    REGEX_MATCH = 10;
    // Value does not match the provided regex pattern. Requires exactly one
    // value in `values` containing the regex.
    NOT_REGEX_MATCH = 11;
    // Value is an empty string or NULL. `values` field is not used.
    IS_EMPTY = 12;
    // Value is not an empty string and not NULL. `values` field is not used.
    IS_NOT_EMPTY = 13;
    // Value starts with the provided prefix. Requires exactly one value in
    // `values`.
    STARTS_WITH = 14;
    // Value does not start with the provided prefix. Requires exactly one value
    // in `values`.
    NOT_STARTS_WITH = 15;
    // Value ends with the provided suffix. Requires exactly one value in
    // `values`.
    ENDS_WITH = 16;
    // Value does not end with the provided suffix. Requires exactly one value
    // in `values`.
    NOT_ENDS_WITH = 17;
    // Value contains the provided substring. Requires exactly one value.
    CONTAINS = 18;
    // Value does not contain the provided substring. Requires exactly one
    // value.
    NOT_CONTAINS = 19;
    // Value matches the provided SQL LIKE pattern. Uses '%' and '_'.
    // Requires exactly one value.
    LIKE = 20;
    // Value does not match the provided SQL LIKE pattern.
    // Requires exactly one value.
    NOT_LIKE = 21;
    // Value is boolean TRUE. `values` field is not used.
    IS_TRUE = 22;
    // Value is boolean FALSE. `values` field is not used.
    IS_FALSE = 23;
    // Value is NULL. `values` field is not used.
    IS_NULL = 24;
    // Value is not NULL. `values` field is not used.
    IS_NOT_NULL = 25;
    // Time column is within the specified duration in the past relative to the
    // current time. Requires exactly one value in `values` containing a
    // duration string (e.g., "12h", "3d").
    IN_PAST = 26;
  }

  // The filter operator to use with the default values.
  FilterOperator filter_operator = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for ListDashboardStateRevisions.
message ListDashboardStateRevisionsRequest {
  // The name of the DashboardState to list revisions for.
  // Format: dashboardStates/{dashboard_state}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "crystalballperf.googleapis.com/DashboardState"
    }
  ];

  // The maximum number of revisions to return. The service may return fewer
  // than this value.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // A page token, received from a previous `ListDashboardStateRevisions` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
