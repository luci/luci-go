syntax = "proto3";

import "go.chromium.org/luci/common/proto/gitiles/common.proto";

package gitiles;

message LogCommit {
  bytes commit = 1;
  bytes tree = 2;
  repeated bytes parents = 3;

  gitiles.User author = 4;
  gitiles.User committer = 5;

  string message = 6;

  message TreeDiff {
    enum ChangeType {
      ADD = 0;
      COPY = 1;
      DELETE = 2;
      MODIFY = 3;
      RENAME = 4;
    }

    ChangeType type = 1;

    bytes old_id = 2;
    uint32 old_mode = 3;
    string old_path = 4;

    bytes new_id = 5;
    uint32 new_mode = 6;
    string new_path = 7;
  }
  repeated TreeDiff tree_diff = 7;
}
