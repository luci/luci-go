// This file defines a common protocol to check what actions a given
// impersonated user can do on a given resource.
// For example, it can be used by one app against another.

syntax = "proto3";

package access;

import "google/protobuf/empty.proto";

// Access service can be used to check what actions a given user can perform
// on a given resource.
service Access {
  // PermittedActions returns a list of actions a given user can perform
  // on a given resource.
  rpc PermittedActions(PermittedActionsRequest) returns (PermittedActionsResponse) {};
  // Description returns types of resources and actions that this service
  // supports.
  // It is intended to be used as self-documentation, for humans that play
  // with the API.
  rpc Description(google.protobuf.Empty) returns (DescriptionResponse) {};
}

// DescriptionResponse is the response message from Access.Description.
message DescriptionResponse {

  // ResourceDescription is one resource type, e.g. "buildbucket bucket"
  // or "swarming pool".
  message ResourceDescription {

    // Action describes what a user can do with a resource.
    message Action {
      // ActionId identifies the action within the resource.
      // It is referenced from Role.allowed_actions.
      // Examples: "READ", "WRITE".
      //
      // For implementers:
      //
      // This must match regexp `^[A-Z\_]+$`.
      string action_id = 1;
      // Comment provides more info about the action.
      string comment = 2;
    }

    // Role is a named set of allowed actions.
    message Role {
      // AllowedActions is a set of action IDs.
      // It defines what a role bearer can do with the resource.
      repeated string allowed_actions = 1;
    }

    // Pattern is a name format for this resource type.
    // Example: "buckets/{bucket-id}".
    // Access.PermittedActions uses resource name patterns to determine the type
    // of resource.
    // See also pattern_parameter for pattern parameter descriptions.
    //
    // For implementers:
    //
    // The format for patterns must be a slash-separated list of slash-separated
    // (kind, param) tuple, where
    //   kind matches regex ^[a-z\-]+$
    //   param matches regex ^\{[a-z\-]+\}$
    // Example: "a/{a}/b/{b}"
    // When parsing a resource string, the param value must be unescaped same as
    // a URL path segment.
    string pattern = 1;
    // PatternParameters is a list of pattern parameters and a mapping from
    // a parameter name to a description.
    // For example,
    // { "bucket-id": "a fully qualified buildBucket bucket ID, e.g.
    //                 (`luci.chromium.try`), defined in a buildbucket cfg
    //                 file"}
    map<string, string> pattern_parameters = 2;
    // Comment provides more info about the resource.
    string comment = 3;
    // Actions defines all possible actions that can performed on this type of
    // resource. See also roles.
    repeated Action actions = 4;
    // Roles maps a role id to a set of actions.
    // Access configurations are typically expressed with roles, not actions.
    map<string, Role> roles = 5;
  }

  // Resources is a list of resource types presented on the given service.
  repeated ResourceDescription resources = 1;
}

// PermittedActionsRequest is a request message to Access.PermittedActions.
//
// Besides explicit fields in the message, there is an implicit parameter: the
// current identity.
message PermittedActionsRequest {
  // Resource is the name of the resource being checked.
  //
  // It must match one of the resource patterns returned by Access.Description.
  // For example, if a service provides a resource with pattern
  // "buckets/{bucket-id}, the resource can be "buckets/luci.chromium.try".
  string resource = 1;
}


// PermittedActionsResponse is the response message of the
// Accses.PermittedActions.
message PermittedActionsResponse {
  // Actions is a list of action ids
  // for resources that do not exist, this list must be empty
  repeated string actions = 1;
}
