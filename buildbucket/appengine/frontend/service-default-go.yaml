service: default-go
runtime: go113

automatic_scaling:
  min_idle_instances: 1

instance_class: F4

entrypoint: >
  /usr/local/bin/start
  -auth-service-host chrome-infra-auth-dev.appspot.com
  -ts-mon-account app-engine-metric-publishers@prodx-mon-chrome-infra.google.com.iam.gserviceaccount.com

handlers:
- url: /admin/.*
  script: auto
  secure: always

- url: /rpcexplorer/?
  static_files: rpcexplorer/index.html
  upload: rpcexplorer/index.html
  secure: always

# The entire subpath is globbed because RPC Explorer uses native URL redirecting
# for sub-pages, and we want all of them to map to the same HTML file.
- url: /rpcexplorer/services/.*
  static_files: rpcexplorer/index.html
  upload: rpcexplorer/index.html
  secure: always

- url: /rpcexplorer
  static_dir: rpcexplorer
  secure: always
