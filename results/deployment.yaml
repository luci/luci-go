apiVersion: v1
kind: Service
metadata:
  name: skeleton-service
  labels:
    app: skeleton-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: http-server
    targetPort: 8800
    protocol: TCP
    name: http
  selector:
    app: skeleton-service

apiVersion: v1
kind: Service
metadata:
  name: skeleton-service-dev
  labels:
    app: skeleton-service-dev
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: http-server
    targetPort: 8800
    protocol: TCP
    name: http
  selector:
    app: skeleton-service-dev

---

apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: skeleton-service
  labels:
    app: skeleton-service
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: skeleton-service
    spec:
      volumes:
      - name: service-account-json
        secret:
          secretName: test-secret
      containers:
      - name: helloworld
        image: gcr.io/luci-test-results/helloworld:stable
        args: ["--service-account-json", "$(GOOGLE_APPLICATION_CREDENTIALS)"]
        imagePullPolicy: Always
        ports:
        - name: http-server
          containerPort: 8800
        volumeMounts:
        - name: service-account-json
          mountPath: /var/secrets/google
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/google/test-service-account.json

apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: skeleton-service-dev
  labels:
    app: skeleton-service-dev
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: skeleton-service-dev
    spec:
      volumes:
      - name: service-account-json
        secret:
          secretName: test-secret
      containers:
      - name: helloworld
        image: gcr.io/luci-test-results-dev/helloworld:stable
        args: ["--service-account-json", "$(GOOGLE_APPLICATION_CREDENTIALS)"]
        imagePullPolicy: Always
        ports:
        - name: http-server
          containerPort: 8800
        volumeMounts:
        - name: service-account-json
          mountPath: /var/secrets/google
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/secrets/google/test-service-account.json
