syntax = "proto3";

package results;

option go_package = "go.chromium.org/luci/results/proto;resultspb";

import "google/protobuf/timestamp.proto";
import "go.chromium.org/luci/results/proto/common.proto";
import "go.chromium.org/luci/results/proto/tests.proto";

message Invocation {
  string id = 1;

  Bucket bucket = 2;

  message Test {
    // regex: ^\w+(\|\w+)*$
    // max length: 1024
    string name = 1; 
    repeated TestVariant variants = 2;
  }
  message TestVariant {
    string variant_id = 1; // see variant_defs below
    repeated Result results = 2;
    repeated Exoneration exonerations = 3;
  }
  // The tests in this and included invocations.
  // By default, only test variants without expected results are included.
  // To load all test results, GetInvocationRequest.expected_tests must be true.
  repeated Test tests = 3;

  // Maps a variant id to its definition.
  map<string, VariantDef> variant_defs = 4;

  repeated StringPair tags = 5;

  bool incomplete = 6;

  message Include {
    string invocation_id = 1;
    // Set or previously included invocations
    // that this include supersedes.
    repeated string supersedes_includes = 2;
  }
  // List of invocations to include
  repeated Include includes = 7;

  // A secret token required to update this invocation.
  // Present only in CreateInvocation response.
  // Elaborated in Ingestion section.
  string update_token = 8;

  // This invocation is no longer updatable.
  bool is_final = 9;

  // Timestamp when to forcefully finalize the invocation.
  // Can be extended.
  google.protobuf.Timestamp deadline = 10;

  google.protobuf.Timestamp create_time = 11;
  google.protobuf.Timestamp finalize_time = 12;
}


// InvocationView specifies what parts of Invocation to return.
// The feature set is driven by use cases, and the storage optimizes for them.
message InvocationView {
  // Do not return test variants that had at least expected result.
  // Will be used by UI by default.
  bool exclude_expected = 1;

  // Do not return test variants with exonerations.
  bool exclude_exonerated = 2;

  // Do not return test variants from superseded invocations.
  bool exclude_inconsequential = 3;

  // If specified, return only test variants that satisfy any of these predicates.
  repeated TestVariantIDPredicate test_variants = 4;

  // If specified, return only these test logs.
  repeated string log_names = 5;

  // If true, guarantees that returned Log messages have "contents" 
  // field populated.
  // If a log is stored externally (Isolate, GS), RPC will load them before
  // returning.
  bool log_contents = 6;
}
