syntax = "proto3";

package lucicfg;

option go_package = "stdlib";


// Service contains information about some LUCI service.
message Service {
  string app_id           = 1;  // e.g. 'luci-logdog'
  string project_cfg_file = 2;  // e.g. 'luci-logdog.cfg'
  string canonical_host   = 3;  // e.g. 'luci-logdog.appspot.com'
  string ui_friendly_host = 4;  // e.g. 'logs.chromium.org'
}


// Project contains information about LUCI project as used internally by
// Skylark scripts. It is accessible to stdlib guts via project.current(), see
// rules/project.sky.
message Project {
  string name             = 1;  // e.g. 'infra'
  repeated string readers = 2;  // e.g. ['group:all', 'user:abc@example.com']
  string repo             = 3;  // e.g. 'https://chromium.googlesource.com/infra/infra'
  string logo_url         = 4;  // e.g. 'https://storage.googleapis.com/.../200x200.png'
  string favicon_url      = 5;  // e.g. 'https://storage.googleapis.com/.../favicon.ico'

  // Default set of service to use. Individual rules can still override them
  // if they really want to (e.g. to scheduler builds to alternative Swarming
  // service).
  Service buildbucket = 50;
  Service logdog = 51;
  Service milo = 52;
  Service scheduler = 53;
  Service swarming = 54;
}
