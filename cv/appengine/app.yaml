service: default
runtime: go113

# luci_gae_vars is interpreted by gae.py, it maps the app ID being deployed
# to values of vars used below.
luci_gae_vars:
  luci-change-verifier-dev:
    AUTH_SERVICE_HOST: chrome-infra-auth-dev.appspot.com
  luci-change-verifier:
    AUTH_SERVICE_HOST: chrome-infra-auth.appspot.com

entrypoint: >
  main -auth-service-host ${AUTH_SERVICE_HOST}
