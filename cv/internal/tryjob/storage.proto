syntax = "proto3";

package cv.tryjob;

option go_package = "go.chromium.org/luci/cv/internal/tryjob;tryjob";

import "go.chromium.org/luci/buildbucket/proto/build.proto";

// Status describes the status of a Tryjob in the external system (e.g.
// Buildbucket).
enum Status {
  // Unspecified state.
  STATUS_UNSPECIFIED = 0;
  // CV hasn't scheduled this Tryjob yet.
  TO_BE_SCHEDULED = 1;
  // Tryjob is pending started in external system.
  PENDING = 2;
  // Tryjob has started in the external system.
  STARTED = 3;
  // External system reports success status for this Tryjob.
  SUCCESS = 4;
  // External system reports non-success status for this Tryjob.
  FAILURE = 5;
  // Tryjob is cancelled in the external system.
  CANCELED = 6;

  // TODO(yiwzhang): Figure out if there's a better way to store following two
  // scenarios/statuses. Lack of ACL could be a temporary thing. CV could start
  // this Tryjob as soon as it gains access.

  // CV lost read access to this Tryjob.
  NO_READ_ACCESS = 10;
  // CV has no permission to schedule this Tryjob.
  NO_SCHEDULE_ACCESS = 11;
}

message Details {
  // Different types of Tryjob.
  oneof job {
    // A Buildbucket build.
    //
    // TODO(yiwzhang): Decide the exact fields that require persistence.
    buildbucket.v2.Build buildbucket_build = 1;
  }
}