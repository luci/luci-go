syntax = "proto3";

package cv.run.eventpb;

option go_package = "go.chromium.org/luci/cv/internal/run/bq/sender;sender";


// SendRunRowTask sends a row for a completed Run to a BQ table.
//
// Queue: "send-run-row".
message SendRunRowTask {
  string run_id = 1;
}
