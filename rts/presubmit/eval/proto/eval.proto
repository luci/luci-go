syntax = "proto3";

package chrome.rts.presubmit.eval;

import "google/protobuf/timestamp.proto";

option go_package = "go.chromium.org/luci/rts/presubmit/eval/proto;evalpb";

// A rejection of a code change due to test failures.
message Rejection {
  // The rejected patchsets.
  repeated GerritPatchset patchsets = 1;

  // When the code change was rejected.
  google.protobuf.Timestamp timestamp = 2;

  // List of tests that caused the rejection.
  repeated Test failed_tests = 3;
}

// A Gerrit CL.
message GerritChange {
  // Gerrit host, e.g. "chromium.googlesource.com".
  string host = 1;

  // Gerrit project, e.g. "chromium/src".
  // It is reqiured.
  string project = 2;

  // Change number, e.g. 123 for the CL
  // https://chromium.googlesource.com/c/123
  int64 number = 3;
}

// A Gerrit patchset.
message GerritPatchset {
  // The CL.
  GerritChange change = 1;

  // The patchset number.
  int64 number = 2;
}

// A single test, typically a test case.
message Test {
  // Test identifier.
	// For Chromium, TestID is a ResultDB TestID.
  string id = 1;

  // The name of the file where the test is defined.
	string file_name = 2;
}

// A single historical record, an entry.
message Record {
  oneof data {
    // A record of a code change rejection due to test failures.
    Rejection rejection = 1;
  }
}
