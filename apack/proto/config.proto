syntax = "proto3";

package apack;

option go_package = "go.chromium.org/luci/apack/proto;apackpb";

message Config {
	// Defaults to ./app.yaml
	string app_config = 1;
	// Defaults to `make spin-build` if such Make target exists
	// in ".".
	BuildScript build_script = 2;
	string tar_storage_path = 4;
}

message BuildScript {
	string path = 1;
	repeated string args = 2;
}
