syntax = "proto3";

package bigquery;

import "google/protobuf/timestamp.proto";

// Attempt includes the state of one CQ attempt.
//
// An attempt involves doing checks for one or more CLs that could
// potentially be submitted together.
// Next id: 8
message Attempt {
  // The unique key for this attempt. This should be unique given a set of CLs
  // included and a trigger time.
  string key = 1;

  // The LUCI project that this attempt belongs to.
  string project = 2;

  // Time when the attempt started (trigger time) and ended (released by CQ).
  // TODO(qyearsley): Is this trigger time the first or last CL trigger time?
  google.protobuf.Timestamp start_time;
  google.protobuf.Timestamp end_time;

  // Gerrit CL revisions in this attempt; there should be one or more.
  repeated GerritChange gerrit_cls = 6;
  string cl_group_key = 7;

  // Builds checked as part of this attempt.
  repeated Build builds = 8;

  bool ready_to_submit = 5;
}


// GerritChange represents one revision of one Gerrit change
// in an attempt.
//
// This is similar to GerritChange in buildbucket/proto/common.proto,
// but with additional fields specific to CQ.
message GerritChange {
  // Gerrit hostname, e.g. "chromium-review.googlesource.com".
  string host = 1;
  // Gerrit project, e.g. "chromium/src".
  string project = 2;
  // Change number, e.g. 12345.
  int64 change = 3;
  // Patch set number, e.g. 1.
  int64 patchset = 4;
  int64 earliest_equivalent_patchset = 5;
  bool dry_run = 6;
  bool submitted = 7;
}

// Build represents one tryjob in an attempt, which is one Buildbucket build.
//
// This is similar to Build in buildbucket/proto/build.proto, but with
// CQ-specific information.
message Build {
  int64 buildbucket_id = 1;
  bool reused = 2;
  bool blocking = 3;
}
