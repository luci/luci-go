acl_sets {
  name: "default"
  acls {
    role: READER
    granted_to: "group:all"
  }
  acls {
    role: OWNER
    granted_to: "group:all"
  }
}

job {
  id: "noop-job-v2"
  acl_sets: "default"
  noop: {}
}

trigger {
  id: "noop-trigger-v2"
  acl_sets: "default"

  noop: {}

  triggers: "noop-job-v2"
}
