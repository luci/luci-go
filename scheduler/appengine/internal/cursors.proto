syntax = "proto3";

package internal.cursors;

option go_package = "internal";


// InvocationsCursor is used to paginate results of GetInvocations RPC call.
//
// It is serialized in base64 and sent to the clients. There's no integrity
// protection: we assume broken cursors are rejected down the call stack
// (which is the case with the datastore cursors).
//
// The internal structure of the cursor is implementation detail and clients
// must not depend on it.
message InvocationsCursor {
  // Points to all finished invocations after 'next_finished'.
  bytes finished_cursor = 1;
  // ID of a finished invocation immediately preceding 'finished_cursor' or
  // -1 if we've exhausted all finished invocations, or 0 if haven't fetched
  // anything yet.
  int64 next_finished = 2;
  // ID of the last returned invocation (active or finished), or -1 if none
  // returned.
  int64 last_returned = 3;
}
