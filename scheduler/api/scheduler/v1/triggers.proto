syntax = "proto3";

package scheduler;


// NoopTrigger is used by tests to represent test triggers.
message NoopTrigger {
  string data = 1;
}


// GitilesTrigger is used by trigger sources that watch Gitiles.
//
// Such triggers are emitted whenever repository state changes.
message GitilesTrigger {
  string repo = 1;     // URL of a repo that changed
  string ref = 2;      // ref that changed, in full, e.g "refs/heads/master"
  string revision = 3; // a revision (SHA1 in hex) pointed to by the ref
}
