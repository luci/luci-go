syntax = "proto3";

package tokenserver;

// TokenFile is representation of a token file on disk (serialized as JSON).
//
// The token file is consumed by whoever wishes to use machine tokens. It is
// intentionally made as simple as possible (e.g. uses unix timestamps instead
// of fancy protobuf ones).

// ProjectScopedServiceAccount is a mapping (caller_id, luci_project) -> service_account.
//
// The caller ID identifies a LUCI service while the service account reduces
// the scope of the caller ID's authority to the luci_project specified in the mapping.
message ProjectScopedServiceAccount {

    // CallerID specifies the LUCI service.
    string caller_id = 1;

    // LuciProject specifies the LUCI project to which the LUCI service is scoped down to.
    string luci_project = 2;

    // ServiceAccount specifies the GCP identity representing the LUCI service with reduced scope access to LUCI project.
    string service_account = 3;

}
