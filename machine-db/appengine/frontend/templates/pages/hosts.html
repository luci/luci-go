{{define "title"}}Host DB - Hosts{{end}}

{{define "content"}}

<h1>Hosts</h1>
  <table class="mdl-data-table mdl-js-data-table">
    <thead>
      <tr>
        <th class="mdl-data-table__cell--non-numeric">Host Name</th>
        <th class="mdl-data-table__cell--non-numeric">VLAN</th>
        <th class="mdl-data-table__cell--non-numeric">Machine</th>
        <th class="mdl-data-table__cell--non-numeric">Operating System</th>
        <th class="mdl-data-table__cell--non-numeric">IP</th>
        <th class="mdl-data-table__cell--non-numeric">State</th>
      </tr>
    </thead>
    <tbody>
     {{range .Hosts}}
      <tr>
        <td class="mdl-data-table__cell--non-numeric">{{.Name}}</td>
        <td class="mdl-data-table__cell--non-numeric">{{.Vlan}}</td>
        <td class="mdl-data-table__cell--non-numeric">{{.Machine}}</td>
        <td class="mdl-data-table__cell--non-numeric">{{.Os}}</td>
        <td class="mdl-data-table__cell--non-numeric">{{.Ipv4}}</td>
        <td class="mdl-data-table__cell--non-numeric">{{.State}}</td>
      </tr>
      {{end}}
    </tbody>
  </table>


{{end}}
