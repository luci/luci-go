syntax = "proto3";

package crimson;

// OperatingSystems implements a read-only service to retrieve operating systems.
service OperatingSystems {
  // GetOperatingSystems retrieves operating systems.
  rpc GetOperatingSystems(OperatingSystemsRequest) returns (OperatingSystemsResponse);
}

// OperatingSystemsRequest is a request to retrieve operating systems.
message OperatingSystemsRequest {
  // The names of operating systems to retrieve.
  repeated string names = 1;
}

// OperatingSystem describes an operating system.
message OperatingSystem {
  // The name of this operating system.
  string name = 1;
  // A description of this operating system.
  string description = 2;
}

// OperatingSystemsResponse is a response to a request to retrieve operating systems.
message OperatingSystemsResponse {
  // The operating systems matching the request.
  repeated OperatingSystem oses = 1;
}
