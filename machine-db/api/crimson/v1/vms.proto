syntax = "proto3";

package crimson;

// A VM in the database.
message VM {
  // The name of this VM on the network. With physical hostname and VLAN ID, uniquely identifies this VM.
  string name = 1;
  // The physical host backing this VM. With VM hostname and VLAN ID, uniquely identifies this VM.
  string host = 2;
  // The VLAN this VM belongs to. With VM hostname and physical hostname, uniquely identifies this VM.
  int64 vlan = 3;
  // The operating system backing this VM.
  string os = 4;
  // A description of this VM.
  string description = 5;
  // The deployment ticket associated with this VM.
  string deployment_ticket = 6;
  // TODO(smut): Add IP address.
}

// CreateVMRequest is a request to create a new VM in the database.
message CreateVMRequest {
  // The VM to create in the database.
  VM vm = 1;
}

// ListVMsRequest is a request to list VMs in the database.
message ListVMsRequest {
  // The names of VMs to get.
  repeated string names = 1;
  // The physical hosts to filter retrieved VMs on.
  repeated string hosts = 2;
  // The VLANs to filter retrieved VMs on.
  repeated int64 vlans = 3;
  // TODO(smut): Add the rest of the filters.
}

// ListVMsResponse is a response to a request to list VMs.
message ListVMsResponse {
  // The VMs matching this request.
  repeated VM vms = 1;
  // TODO(smut): Support page tokens.
}
