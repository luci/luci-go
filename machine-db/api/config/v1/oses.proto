syntax = "proto3";

package config;

// OperatingSystemConfig describes an operating system.
message OperatingSystemConfig {
  // The name of this operating system.
  string name = 1;
  // A description of this operating system.
  string description = 2;
}

// OperatingSystemsConfig enumerates operating systems.
message OperatingSystemsConfig {
  // The name of an operating system.
  repeated OperatingSystemConfig operating_system = 1;
}
