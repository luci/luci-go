syntax = "proto3";

package config;

// SettingsConfig describes the server settings.
message SettingsConfig {
	// The database to connect to.
	string database = 1;
	// The username to authenticate to the database with.
	string username = 2;
	// The password to authenticate to the database with.
	string password = 3;
}
