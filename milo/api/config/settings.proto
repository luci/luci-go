syntax = "proto3";

package config;

// Settings represents the format for the global (service) config for Milo.
message Settings {
  message Buildbot {
    // internal_reader is the infra-auth group that is allowed to read internal
    // buildbot data.
    string internal_reader = 1;

    // public_subscription is the name of the pubsub topic where public builds come in
    // from
    string public_subscription = 2;

    // internal_subscription is the name of the pubsub topic where internal builds
    // come in from
    string internal_subscription = 3;
  }
  Buildbot buildbot = 1;

  message Buildbucket {
    // name is the user friendly name of the Buildbucket instance we're pointing to.
    string name = 1;

    // host is the hostname of the buildbucket instance we're pointing to (sans schema).
    string host = 2;

    // project is the name of the Google Cloud project that the pubsub topic
    // belongs to.
    string project = 3;
  }
  Buildbucket buildbucket = 2;

  message Swarming {
    // default_host is the hostname of the swarming host Milo defaults to, if
    // none is specified.  Default host is implicitly an allowed host.
    string default_host = 1;

    // allowed_hosts is a whitelist of hostnames of swarming instances
    // that Milo is allowed to talk to.  This is specified here for security
    // reasons, because Milo will hand out its oauth2 token to a swarming host.
    repeated string allowed_hosts = 2;
  }
  Swarming swarming = 3;

  // GooglesourceAcls grants read access on a set of Git/Gerrit hosts or projects.
  message GooglesourceAcls {
    // host corresponds to two domains:
    //  * <host>.googlesource.com (Gitiles)
    //  * <host>-review.googlesource.com (Gerrit)
    //
    // At least one required. If projects are specified below, must be just one.
    repeated string host = 1;

    // project corresponds to Git repository and Gerrit CLs in it.
    //
    // URL of this repository is https://<host>.googlesource.com/<project>.
    //
    // Project may contain /, e.g., "chromium/src" will refer to git repo
    //   https://<host>.googlesource.com/chromium/src.
    //
    // Optional. If specified, exactly one subhost must be defined.
    repeated string project = 2;

    // readers are allowed to read git/gerrit data from targets.
    //
    // Three types of identity strings are supported:
    //  * Emails.                   For example: "someuser@example.com"
    //  * Chrome-infra-auth Groups. For example: "group:committers"
    //  * Auth service identities.  For example: "kind:name"
    //
    // Required.
    repeated string readers = 3;
  }

  // googlesource_acls instructs Milo to provide Git/Gerrit data (e.g.,
  // blamelist) to some of its users on entire subdomains or just repositories
  // (Gerrit "projects") on *.googlesource.com.
  repeated GooglesourceAcls googlesource_acls = 4;
}
