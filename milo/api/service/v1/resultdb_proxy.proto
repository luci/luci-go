syntax = "proto3";

package luci.milo.v1;

import "go.chromium.org/luci/resultdb/proto/v1/artifact.proto";
import "go.chromium.org/luci/resultdb/proto/v1/resultdb.proto";
import "go.chromium.org/luci/resultdb/proto/v1/invocation.proto";

option go_package = "go.chromium.org/luci/milo/api/service/v1;milopb";

// A Service that proxies some of the RPCs to the ResultDB server.
service ResultDBProxy {
  rpc GetInvocation(luci.resultdb.v1.GetInvocationRequest) returns (luci.resultdb.v1.Invocation) {};
  rpc QueryTestResults(luci.resultdb.v1.QueryTestResultsRequest) returns (luci.resultdb.v1.QueryTestResultsResponse) {};
  rpc QueryTestExonerations(luci.resultdb.v1.QueryTestExonerationsRequest) returns (luci.resultdb.v1.QueryTestExonerationsResponse) {};
  rpc ListArtifacts(luci.resultdb.v1.ListArtifactsRequest) returns (luci.resultdb.v1.ListArtifactsResponse) {};
  rpc GetArtifact(luci.resultdb.v1.GetArtifactRequest) returns (luci.resultdb.v1.Artifact) {};
}
