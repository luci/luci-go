{{define "title"}}Milo{{end}}

{{define "head"}}{{end}}

{{define "body"}}
<div class="search">
  <form action="/search" method="GET">
    <input id="search-text" type="text" name="q" placeholder="Search for builders..." autofocus>
    <input type="submit">
  </form>
</div>

<div class="project-list">
  {{ range .frontpage.Projects }}
  <a href="/p/{{.ID}}/consoles" aria-label="Project {{.ID}}">
    <div class="project">
      {{ if .LogoURL }}
        <img src="{{.LogoURL}}" />
      {{ else }}
        <div class="project-favicon-text">{{ printf "%.2s" .ID }}</div>
      {{ end }}
      <div class="project-label">{{.ID}}</div>
    </div>
  </a>
  {{ end }}
<div class="project-list">

{{end}} <!-- Body -->
