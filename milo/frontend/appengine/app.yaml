runtime: go
api_version: go1
service: default

instance_class: F4_1G

handlers:
- url: /_ah/warmup
  script: _go_app
  secure: always
  login: admin

# PRPC API.
- url: /prpc/.*
  script: _go_app
  secure: always

# For static resources such as css and js files.
- url: /static
  secure: always
  static_dir: static

# For admin resources.
- url: /admin/.*
  script: _go_app
  secure: always
  login: admin

# All internal handlers, such as cron.
- url: /internal/.*
  script: _go_app
  secure: always
  login: admin

# Pubsub Handler.
- url: /_ah/push-handlers/.*
  script: _go_app
  secure: always
  login: admin

# Everything goes here.
- url: /.*
  script: _go_app
  secure: always

includes:
- ./static/include.yaml

inbound_services:
- warmup
