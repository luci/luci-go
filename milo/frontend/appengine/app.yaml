service: default
runtime: go111

instance_class: F4_1G

automatic_scaling:
  min_idle_instances: 10
  max_idle_instances: automatic  # default value
  min_pending_latency: 10ms
  max_pending_latency: 30ms  # default value
  max_concurrent_requests: 8  # note: the default value is 10

handlers:
# Single robots.txt file, must be served under root.
- url: /robots.txt
  static_files: static/robots.txt
  upload: static/robots.txt

# Generated files in ResultUI.
# They all have content hash in their file names, so can be cached longer.
- url: /static/dist
  secure: always
  static_dir: static/dist
  http_headers:
    # Set max-age to 1 hour, stale-while-revalidate to 7 days.
    Cache-Control: public,max-age=3600,stale-while-revalidate=604800

# For other static resources such as css and js files (including other ResultUI
# files).
- url: /static
  secure: always
  static_dir: static

# For admin resources.
- url: /admin/.*
  script: auto
  secure: always
  login: admin

# All internal handlers, such as cron.
- url: /internal/.*
  script: auto
  secure: always
  login: admin

# Pubsub Handler.  This is strictly necessary because the default module
# contains a /.* routing rule, so if it was targeted directly, we still want
# login:admin to apply.
- url: /_ah/push-handlers/.*
  script: auto
  secure: always
  login: admin

# ResultUI frontend routes.
# Explicitly set Cache-Control to ensure that the page lives shorter than its
# dependencies (e.g. generated JS files).
- url: /ui/.*
  secure: always
  static_files: index.html
  upload: index.html
  http_headers:
    # Set max-age to 10mins, stale-while-revalidate to 1 day.
    Cache-Control: public,max-age=600,stale-while-revalidate=86400

# The rest is handled by Go code.
- url: /.*
  script: auto
  secure: always

inbound_services:
- warmup
