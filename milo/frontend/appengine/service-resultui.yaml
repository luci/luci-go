service: resultui
runtime: go111

handlers:
# For static resources such as css and js files.
- url: /static
  secure: always
  static_dir: resultui/static

# Auth related endpoints are handled by go handlers.
- url: /auth/.*
  secure: always
  script: auto

# Everything else goes here.
- url: /.*
  secure: always
  static_files: resultui/index.html
  upload: resultui/index.html
