syntax = "proto3";

package affiliations;

option go_package = "go.chromium.org/luci/gce/api/affiliations/v1;affiliations";

import "go.chromium.org/luci/common/proto/options.proto";

option (luci.file_metadata) = {
  doc_url: "https://config.luci.app/schemas/services/gce-provider:vm_affiliations.cfg";
};

// Affiliation configuration for a specific service account identity within a GCP project.
message ServiceAccountAffiliation {
  // The email address of the service account attached to the new VM.
  string email = 1;

  // The cloud project ID where the VMs reside.
  string project = 2;

  // A list of VM hostname prefixes assigned to this service account in this project.
  repeated string prefix = 3;
}

// Top-level container for all VM affiliation entries in vm_affiliations.cfg.
message VMAffiliations {
  // A list of affiliations grouped by service account email.
  repeated ServiceAccountAffiliation service_account = 1;
}
