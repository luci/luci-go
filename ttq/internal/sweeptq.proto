syntax = "proto3";

package internal.sweep;

option go_package = "go.chromium.org/luci/ttq/internal";

import "google/protobuf/timestamp.proto";

// SweepWorkItem defines work to be done by sweep task.
message SweepWorkItem {
  // Shard number in range of [0 .. ttq.Options.Shards).
  int32 shard = 1;
  // String-encoded partition.Partition.
  string partition = 2;
  // eta defines when the earliest time task may be executed.
  // for level>0 tasks, it's the copy of the parent task.
  google.protobuf.Timestamp eta = 3;
  // level counts recursion level for monitoring/debugging purposes.
  // Cron triggers tasks at level=0. If there is a big backlog,
  // level=0 task will offload some work to level=1 tasks.
  // level > 1 should not normally happen and indicates either a bug or a very
  // overloaded system.
  int32 level = 4;
}
