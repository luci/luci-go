{{define "body"}}

<table>
  <thead>
    <th>Name</th>
    <th>Size</th>
    <th>Hash</th>
  </thead>
  {{range .Directories}}
  <tbody>
    <td>{{.Name}}</td>
    <td>{{.Digest.SizeBytes}}</td>
    <td>{{.Digest.Hash}}</td>
  </tbody>
  {{end}}
  {{range .Files}}
  <tbody>
    <td>{{.Name}}</td>
    <td>{{.Digest.SizeBytes}}</td>
    <td>{{.Digest.Hash}}</td>
  </tbody>
  {{end}}
  {{range .Links}}
  <tbody>
    <td>{{.Name}}</td>
    <td>-</td>
    <td>{{.Digest.Target}}</td>
  </tbody>
  {{end}}
</table>

{{end}} <!-- Body -->
